---
layout: default
title: Changelog
permalink: /changelog/
---

<div class="max-w-4xl mx-auto px-6 py-12">
  <header class="flex items-center justify-between mb-12">
    <a href="{{ '/' | relative_url }}" class="btn-3d px-6 py-2 rounded-xl bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-sm font-bold flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      Torna al Quiz
    </a>
    <h1 class="text-3xl font-extrabold tracking-tight text-brand-600 dark:text-brand-400">Changelog</h1>
  </header>

  <main id="changelogContainer" class="space-y-12">
    <!-- Dinamico -->
    <div class="animate-pulse space-y-4">
      <div class="h-8 bg-slate-200 dark:bg-slate-800 rounded-xl w-1/4"></div>
      <div class="h-32 bg-slate-200 dark:bg-slate-800 rounded-3xl w-full"></div>
    </div>
  </main>
</div>

<script>
  async function loadChangelog() {
    try {
      const res = await fetch('{{ "/data/changelog.json" | relative_url }}');
      const data = await res.json();
      const container = document.getElementById('changelogContainer');
      
      container.innerHTML = data.map(item => `
        <section class="relative pl-8 before:absolute before:left-0 before:top-2 before:bottom-0 before:w-px before:bg-slate-200 dark:before:bg-slate-800">
          <div class="absolute left-0 top-2 w-2 h-2 rounded-full bg-brand-500 -translate-x-1/2 ring-4 ring-white dark:ring-slate-950"></div>
          
          <div class="flex items-baseline gap-4 mb-4">
            <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100">${item.title}</h2>
            <span class="text-sm font-mono text-slate-500 dark:text-slate-400">v${item.version} &bull; ${item.date}</span>
          </div>
          
          <div class="card-glass border border-white/20 dark:border-slate-800 rounded-3xl p-6 shadow-xl">
            <ul class="space-y-3">
              ${item.changes.map(change => `
                <li class="flex items-start gap-3 text-slate-600 dark:text-slate-300">
                  <svg class="w-5 h-5 text-brand-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                  <span>${change}</span>
                </li>
              `).join('')}
            </ul>
          </div>
        </section>
      `).join('');
    } catch (e) {
      console.error('Error loading changelog:', e);
      document.getElementById('changelogContainer').innerHTML = '<p class="text-center text-rose-500">Errore nel caricamento del changelog.</p>';
    }
  }
  loadChangelog();
</script>
