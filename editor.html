<!DOCTYPE html>
<html lang="it" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Dataset Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e',
              900: '#134e4a'
            }
          },
          boxShadow: {
            soft: '0 10px 30px rgba(15, 23, 42, 0.08)'
          }
        }
      }
    };
  </script>
  <style>
    .card-glass { backdrop-filter: blur(12px); }
  </style>
</head>
<body class="h-full bg-slate-100 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
  <div class="min-h-full bg-gradient-to-br from-teal-50 via-white to-slate-100 dark:from-slate-950 dark:via-slate-950 dark:to-slate-900 flex flex-col">
    <!-- Header -->
    <header class="border-b border-slate-200/80 bg-white/80 dark:border-slate-800 dark:bg-slate-950/80 shrink-0">
      <div class="mx-auto flex w-full max-w-screen-2xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-4">
          <a href="index.html" class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100 text-slate-600 transition hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
          </a>
          <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-brand-600 text-white shadow-soft">
            <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
          </div>
          <div>
            <h1 class="text-xl font-bold tracking-tight">Dataset Editor</h1>
            <p class="text-sm text-slate-600 dark:text-slate-400">Crea e modifica dataset JSON locali per il Quiz Builder.</p>
          </div>
        </div>
        <button id="themeToggle" class="inline-flex min-h-11 items-center gap-2 rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-brand-500 hover:text-brand-700 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200">
          <span id="themeLabel">Tema</span>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 mx-auto grid w-full max-w-screen-2xl gap-6 px-4 py-6 sm:px-6 lg:grid-cols-[300px,minmax(0,1fr),350px] lg:px-8 items-start">
      
      <!-- Left Sidebar: Topics & Actions -->
      <aside class="space-y-6">
        <section class="rounded-3xl border border-white/70 bg-white/85 p-5 shadow-soft card-glass dark:border-slate-800 dark:bg-slate-900/80">
          <h2 class="text-lg font-semibold mb-4">Gestione Dataset</h2>
          <div class="space-y-3">
            <button id="exportJsonBtn" class="w-full rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-700">
              Esporta come JSON
            </button>
            <div class="relative">
              <input type="file" id="importJsonInput" accept=".json" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
              <button class="w-full rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
                Carica JSON esistente
              </button>
            </div>
          </div>
        </section>

        <section class="rounded-3xl border border-white/70 bg-white/85 p-5 shadow-soft card-glass dark:border-slate-800 dark:bg-slate-900/80">
          <h2 class="text-lg font-semibold mb-4">Argomenti</h2>
          <div class="flex gap-2 mb-4">
            <input type="text" id="newTopicInput" placeholder="Nuovo argomento..." class="flex-1 rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-brand-500 dark:border-slate-700 dark:bg-slate-950" />
            <button id="addTopicBtn" class="rounded-xl bg-slate-900 px-3 py-2 text-white transition hover:bg-slate-700 dark:bg-white dark:text-slate-900 dark:hover:bg-slate-200">+</button>
          </div>
          <div id="topicsList" class="flex flex-wrap gap-2 text-sm">
            <p class="text-slate-500 text-xs italic w-full">Nessun argomento aggiunto.</p>
          </div>
        </section>
      </aside>

      <!-- Middle: Editor Form -->
      <section class="rounded-3xl border border-white/70 bg-white/85 p-6 shadow-soft card-glass dark:border-slate-800 dark:bg-slate-900/80">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-semibold" id="formTitle">Nuova Domanda</h2>
          <button id="clearFormBtn" class="text-sm font-medium text-brand-600 hover:text-brand-800 dark:text-brand-500 dark:hover:text-brand-400">Svuota Form</button>
        </div>

        <form id="questionForm" class="space-y-6">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">Argomento</label>
              <select id="topicSelect" required class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none transition focus:border-brand-500 dark:border-slate-700 dark:bg-slate-950">
                <option value="" disabled selected>Seleziona un argomento</option>
              </select>
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">Difficoltà (1-5)</label>
              <select id="difficultySelect" required class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none transition focus:border-brand-500 dark:border-slate-700 dark:bg-slate-950">
                <option value="1">1 - Molto Facile</option>
                <option value="2">2 - Facile</option>
                <option value="3" selected>3 - Medio</option>
                <option value="4">4 - Difficile</option>
                <option value="5">5 - Molto Difficile</option>
              </select>
            </div>
          </div>

          <div>
            <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">Testo della Domanda</label>
            <textarea id="questionText" required rows="3" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-brand-500 dark:border-slate-700 dark:bg-slate-950" placeholder="Inserisci la domanda..."></textarea>
          </div>

          <div>
            <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">URL Immagine (Opzionale)</label>
            <input type="url" id="questionImageUrl" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-brand-500 dark:border-slate-700 dark:bg-slate-950" placeholder="https://..." />
          </div>

          <div class="space-y-4">
            <div class="flex items-center justify-between">
              <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200">Risposte e Spiegazioni</h3>
              <p class="text-xs text-slate-500">Seleziona la corretta</p>
            </div>

            <!-- Answers -->
            <div id="answersContainer" class="space-y-4">
              <!-- Rendered via JS to avoid repetition -->
            </div>
            
            <div class="flex gap-4 mt-2">
              <button type="button" id="addAnswerBtn" class="text-xs font-semibold text-brand-600 hover:text-brand-800 dark:text-brand-400 dark:hover:text-brand-300">+ Aggiungi Risposta</button>
              <button type="button" id="removeAnswerBtn" class="text-xs font-semibold text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300">- Rimuovi Risposta</button>
            </div>
          </div>

          <div class="pt-4 flex gap-3">
            <button type="submit" id="saveQuestionBtn" class="flex-1 rounded-xl bg-brand-600 px-4 py-3 text-sm font-semibold text-white shadow-md transition hover:bg-brand-700">Aggiungi Domanda</button>
            <button type="button" id="cancelEditBtn" class="hidden rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">Annulla</button>
          </div>
        </form>
      </section>

      <!-- Right Sidebar: Questions List -->
      <aside class="space-y-6 flex flex-col h-[calc(100vh-8rem)]">
        <section class="rounded-3xl border border-white/70 bg-white/85 p-5 shadow-soft card-glass flex-1 overflow-y-auto dark:border-slate-800 dark:bg-slate-900/80">
          <div class="flex items-center justify-between mb-4 sticky top-0 bg-white/90 dark:bg-slate-900/90 pb-2 backdrop-blur-md">
            <h2 class="text-lg font-semibold">Anteprima Dataset</h2>
            <span id="questionCountBadge" class="rounded-full bg-slate-200 px-2.5 py-1 text-xs font-semibold text-slate-700 dark:bg-slate-800 dark:text-slate-300">0 dom.</span>
          </div>
          <div id="questionsList" class="space-y-3">
            <p class="text-slate-500 text-sm italic">Nessuna domanda inserita.</p>
          </div>
        </section>
      </aside>

    </main>
  </div>

  <script>
    // Theme Logic
    const themeToggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');
    const html = document.documentElement;

    function applyTheme(isDark) {
      if (isDark) {
        html.classList.add('dark');
        themeLabel.textContent = 'Chiaro';
      } else {
        html.classList.remove('dark');
        themeLabel.textContent = 'Scuro';
      }
    }

    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    let isDark = savedTheme === 'dark' || (!savedTheme && systemPrefersDark);
    applyTheme(isDark);

    themeToggle.addEventListener('click', () => {
      isDark = !isDark;
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      applyTheme(isDark);
    });

    // Editor Logic
    let topics = [];
    let questions = [];
    let editingId = null;

    // DOM Elements
    const topicsListEl = document.getElementById('topicsList');
    const newTopicInput = document.getElementById('newTopicInput');
    const addTopicBtn = document.getElementById('addTopicBtn');
    const topicSelect = document.getElementById('topicSelect');
    
    const answersContainer = document.getElementById('answersContainer');
    const questionForm = document.getElementById('questionForm');
    const clearFormBtn = document.getElementById('clearFormBtn');
    const saveQuestionBtn = document.getElementById('saveQuestionBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const formTitle = document.getElementById('formTitle');
    
    const questionsListEl = document.getElementById('questionsList');
    const questionCountBadge = document.getElementById('questionCountBadge');
    const exportJsonBtn = document.getElementById('exportJsonBtn');
    const importJsonInput = document.getElementById('importJsonInput');

    // Initialize Answers Form
    let answerCount = 4;
    const addAnswerBtn = document.getElementById('addAnswerBtn');
    const removeAnswerBtn = document.getElementById('removeAnswerBtn');

    function renderAnswerInputs(count) {
      // Save existing values to not lose them during re-render
      const savedData = [];
      for (let i = 0; i < answersContainer.children.length; i++) {
        const textInput = document.getElementById(`ans_${i}`);
        const expInput = document.getElementById(`exp_${i}`);
        const isChecked = document.querySelector(`input[name="correctAnswer"][value="${i}"]`)?.checked || false;
        if (textInput) {
          savedData.push({ text: textInput.value, exp: expInput.value, checked: isChecked });
        }
      }

      answersContainer.innerHTML = Array.from({ length: count }).map((_, i) => {
        const isChecked = savedData[i]?.checked || (i === 0 && !savedData.some(s => s.checked));
        return `
        <div class="relative rounded-xl border border-slate-200 bg-slate-50 p-4 pl-12 dark:border-slate-700/50 dark:bg-slate-950/40">
          <input type="radio" name="correctAnswer" value="${i}" required class="absolute left-4 top-[1.35rem] h-4 w-4 cursor-pointer text-brand-600 focus:ring-brand-600" ${isChecked ? 'checked' : ''} />
          <div class="space-y-3">
            <input type="text" id="ans_${i}" required placeholder="Testo risposta ${i + 1}" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-brand-500 dark:border-slate-600 dark:bg-slate-900" />
            <input type="text" id="exp_${i}" required placeholder="Spiegazione..." class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-brand-500 dark:border-slate-600 dark:bg-slate-900" />
          </div>
        </div>
      `}).join('');

      // Restore text values
      for (let i = 0; i < Math.min(count, savedData.length); i++) {
        document.getElementById(`ans_${i}`).value = savedData[i].text;
        document.getElementById(`exp_${i}`).value = savedData[i].exp;
      }
    }
    
    addAnswerBtn.addEventListener('click', () => {
      answerCount++;
      renderAnswerInputs(answerCount);
    });

    removeAnswerBtn.addEventListener('click', () => {
      if (answerCount > 2) {
        answerCount--;
        renderAnswerInputs(answerCount);
      } else {
        alert('Una domanda deve avere almeno 2 risposte.');
      }
    });

    renderAnswerInputs(answerCount);

    // Topics Management
    function renderTopics() {
      if (topics.length === 0) {
        topicsListEl.innerHTML = '<p class="text-slate-500 text-xs italic w-full">Nessun argomento aggiunto.</p>';
        topicSelect.innerHTML = '<option value="" disabled selected>Nessun argomento disponibile</option>';
        return;
      }

      topicsListEl.innerHTML = topics.map(t => `
        <span class="inline-flex items-center gap-1.5 rounded-full bg-slate-200 px-3 py-1 text-xs font-medium text-slate-700 dark:bg-slate-800 dark:text-slate-300">
          ${t}
          <button type="button" onclick="deleteTopic('${t}')" class="text-slate-500 hover:text-red-500">&times;</button>
        </span>
      `).join('');

      const currentValue = topicSelect.value;
      topicSelect.innerHTML = '<option value="" disabled>Seleziona un argomento</option>' + 
        topics.map(t => `<option value="${t}">${t}</option>`).join('');
      
      if (topics.includes(currentValue)) {
        topicSelect.value = currentValue;
      }
    }

    function addTopic() {
      const val = newTopicInput.value.trim();
      if (val && !topics.includes(val)) {
        topics.push(val);
        newTopicInput.value = '';
        renderTopics();
      }
    }

    window.deleteTopic = function(topic) {
      if (questions.some(q => q.argomento === topic)) {
        alert("Impossibile eliminare l'argomento: ci sono domande associate. Eliminale o cambiane l'argomento prima.");
        return;
      }
      topics = topics.filter(t => t !== topic);
      renderTopics();
    }

    addTopicBtn.addEventListener('click', addTopic);
    newTopicInput.addEventListener('keypress', e => { if (e.key === 'Enter') addTopic(); });

    // Questions Management
    function renderQuestionsList() {
      questionCountBadge.textContent = `${questions.length} dom.`;
      
      if (questions.length === 0) {
        questionsListEl.innerHTML = '<p class="text-slate-500 text-sm italic">Nessuna domanda inserita.</p>';
        return;
      }

      // Group by topic
      const grouped = {};
      questions.forEach(q => {
        if (!grouped[q.argomento]) grouped[q.argomento] = [];
        grouped[q.argomento].push(q);
      });

      questionsListEl.innerHTML = Object.entries(grouped).map(([topic, qs]) => `
        <div class="mb-4 last:mb-0">
          <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 dark:text-slate-400">${topic} (${qs.length})</h3>
          <div class="space-y-2">
            ${qs.map(q => `
              <div class="rounded-xl border border-slate-200 bg-white p-3 shadow-sm dark:border-slate-700 dark:bg-slate-950/50">
                <div class="flex items-start justify-between gap-2">
                  <p class="text-sm font-medium line-clamp-2">${q.testo_domanda}</p>
                  <span class="shrink-0 text-[10px] font-bold text-brand-600 dark:text-brand-400">Diff. ${q.difficolta}</span>
                </div>
                <div class="mt-2 flex justify-end gap-2">
                  <button type="button" onclick="loadQuestionForEdit('${q.id}')" class="text-xs font-medium text-slate-600 hover:text-brand-600 dark:text-slate-400 dark:hover:text-brand-400">Modifica</button>
                  <button type="button" onclick="deleteQuestion('${q.id}')" class="text-xs font-medium text-red-600 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300">Elimina</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    window.deleteQuestion = function(id) {
      if(confirm('Sei sicuro di voler eliminare questa domanda?')) {
        questions = questions.filter(q => q.id !== id);
        if (editingId === id) resetForm();
        renderQuestionsList();
      }
    };

    window.loadQuestionForEdit = function(id) {
      const q = questions.find(q => q.id === id);
      if (!q) return;

      editingId = id;
      formTitle.textContent = 'Modifica Domanda';
      saveQuestionBtn.textContent = 'Salva Modifiche';
      cancelEditBtn.classList.remove('hidden');

      topicSelect.value = q.argomento;
      document.getElementById('difficultySelect').value = q.difficolta;
      document.getElementById('questionText').value = q.testo_domanda;
      document.getElementById('questionImageUrl').value = q.immagine_url || '';

      answerCount = q.risposte.length || 4;
      renderAnswerInputs(answerCount);

      q.risposte.forEach((ans, i) => {
        document.getElementById(`ans_${i}`).value = ans.testo_risposta;
        document.getElementById(`exp_${i}`).value = ans.spiegazione_vera_o_falsa;
      });

      const radioBtn = document.querySelector(`input[name="correctAnswer"][value="${q.risposta_corretta}"]`);
      if (radioBtn) radioBtn.checked = true;
      
      document.getElementById('questionText').scrollIntoView({ behavior: 'smooth', block: 'center' });
    };

    function resetForm() {
      editingId = null;
      formTitle.textContent = 'Nuova Domanda';
      saveQuestionBtn.textContent = 'Aggiungi Domanda';
      cancelEditBtn.classList.add('hidden');
      answerCount = 4;
      renderAnswerInputs(answerCount);
      questionForm.reset();
      document.querySelector('input[name="correctAnswer"][value="0"]').checked = true;
    }

    clearFormBtn.addEventListener('click', resetForm);
    cancelEditBtn.addEventListener('click', resetForm);

    questionForm.addEventListener('submit', (e) => {
      e.preventDefault();

      if (!topicSelect.value) {
        alert('Seleziona un argomento (aggiungine uno dalla barra laterale se necessario).');
        return;
      }

      const q = {
        id: editingId || crypto.randomUUID(),
        argomento: topicSelect.value,
        difficolta: parseInt(document.getElementById('difficultySelect').value, 10),
        testo_domanda: document.getElementById('questionText').value.trim(),
        immagine_url: document.getElementById('questionImageUrl').value.trim(),
        risposta_corretta: parseInt(document.querySelector('input[name="correctAnswer"]:checked').value, 10),
        risposte: Array.from({ length: answerCount }).map((_, i) => ({
          testo_risposta: document.getElementById(`ans_${i}`).value.trim(),
          spiegazione_vera_o_falsa: document.getElementById(`exp_${i}`).value.trim()
        }))
      };

      if (!q.immagine_url) delete q.immagine_url;

      if (editingId) {
        const idx = questions.findIndex(x => x.id === editingId);
        questions[idx] = q;
      } else {
        questions.push(q);
      }

      resetForm();
      renderQuestionsList();
    });

    // Import / Export JSON
    exportJsonBtn.addEventListener('click', () => {
      if (questions.length === 0) {
        alert('Il dataset è vuoto!');
        return;
      }

      // Group into final schema
      const grouped = {};
      questions.forEach(q => {
        if (!grouped[q.argomento]) grouped[q.argomento] = [];
        // Remove internal ID for export
        const { id, argomento, ...exportQ } = q;
        grouped[q.argomento].push(exportQ);
      });

      const finalDataset = Object.entries(grouped).map(([argomento, domande]) => ({
        argomento,
        domande
      }));

      const dataStr = JSON.stringify(finalDataset, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = `dataset_${Date.now()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    importJsonInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      try {
        const text = await file.text();
        const data = JSON.parse(text);

        // Basic validation
        if (!Array.isArray(data)) throw new Error('Root must be array');

        let importedQuestions = [];
        let importedTopics = new Set(topics);

        data.forEach(item => {
          if (!item.argomento || !Array.isArray(item.domande)) return;
          importedTopics.add(item.argomento);
          
          item.domande.forEach(d => {
            importedQuestions.push({
              id: crypto.randomUUID(),
              argomento: item.argomento,
              difficolta: d.difficolta || 1,
              testo_domanda: d.testo_domanda || '',
              risposta_corretta: d.risposta_corretta || 0,
              risposte: d.risposte || []
            });
          });
        });

        topics = Array.from(importedTopics);
        questions = importedQuestions;
        
        renderTopics();
        renderQuestionsList();
        importJsonInput.value = '';
        alert('Dataset caricato con successo!');
      } catch (err) {
        alert('Errore nel parsing del file JSON. Assicurati che sia nel formato corretto.');
        console.error(err);
      }
    });

  </script>
</body>
</html>
